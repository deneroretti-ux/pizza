<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pizza Festa</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<header>
  <h1>Festa Franciscana</h1>
  <h2>Barraca da Pizza</h2>
</header>

<div class="container">
  <div id="produtos"></div>

  <textarea id="obs" placeholder="Observação (ex: sem cebola)"></textarea>

  <div class="pagamento">
    <label><input type="radio" name="status" value="PAGO" checked> Pago</label>
    <label><input type="radio" name="status" value="PENDENTE"> Pendente</label>
  </div>

  <h2>Total: R$ <span id="total">0</span></h2>

  <button onclick="finalizar()">Finalizar Pedido</button>
  <button onclick="relatorio()">Relatório</button>
</div>

<script src="script.js"></script>
</body>
</html>
