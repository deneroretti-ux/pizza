<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizza Premium</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="app">

<header class="topo">
  <img src="logo.png" class="logo-img">
  <h2 class="subtitulo">Barraca da Pizza</h2>
</header>

<section class="card">
  <div id="produtos"></div>
</section>

<section class="card">
  <textarea id="obs" placeholder="Observação (ex: sem cebola)"></textarea>

  <div class="pagamento">
    <label><input type="radio" name="status" value="PAGO" checked> Pago</label>
    <label><input type="radio" name="status" value="PENDENTE"> Pendente</label>
  </div>
</section>

<section class="rodape">
  <div class="total">Total: R$ <span id="total">0,00</span></div>
  <button onclick="finalizar()" class="btn-main">Finalizar Pedido</button>
  <button onclick="relatorio()" class="btn-sec">📊 Relatório</button>
</section>

</main>

<script src="script.js"></script>
</body>
</html>
