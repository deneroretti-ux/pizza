<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Festa Franciscana - Pizza</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="topo">
      <div class="logo-festa">
        <div class="cruz">✝</div>
        <div>
          <strong>Festa</strong>
          <span>Franciscana</span>
        </div>
      </div>
      <h1>Festa Franciscana</h1>
      <h2>Barraca da Pizza</h2>
    </header>

    <section class="card">
      <div id="produtos" class="produtos"></div>
    </section>

    <section class="card">
      <label class="titulo-campo">Observação</label>
      <textarea id="obs" placeholder="Ex: sem cebola, bem assada..."></textarea>

      <div class="pagamento">
        <label class="opcao ativo"><input type="radio" name="status" value="PAGO" checked> Pago</label>
        <label class="opcao"><input type="radio" name="status" value="PENDENTE"> Pendente</label>
      </div>
    </section>

    <section class="rodape">
      <div class="total">Total: <strong>R$ <span id="total">0</span></strong></div>
      <button class="finalizar" onclick="finalizar()">Finalizar Pedido</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
