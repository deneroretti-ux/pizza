<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Barraca da Pizza</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <main class="app">
    <header class="topo">
      <img src="logo.png" alt="Festa Franciscana" class="logo-img">
      <h1>Barraca da Pizza</h1>
    </header>

    <section class="card pedido-card">
      <div class="pedido-info">
        <span>Próximo pedido</span>
        <strong id="numeroPedido">001</strong>
      </div>
      <button class="btn-relatorio-topo" onclick="abrirRelatorio()">📊 Relatório</button>
    </section>

    <section class="card">
      <div id="produtos" class="produtos"></div>
    </section>

    <section class="card">
      <label class="label">Observação</label>
      <textarea id="obs" placeholder="Ex: sem cebola, bem assada..."></textarea>

      <div class="pagamento">
        <label class="radio-card">
          <input type="radio" name="status" value="PAGO" checked>
          <span>✅ Pago</span>
        </label>
        <label class="radio-card">
          <input type="radio" name="status" value="PENDENTE">
          <span>⚠️ Pendente</span>
        </label>
      </div>
    </section>

    <section class="bottom-bar">
      <div class="total-box">
        <span>Total</span>
        <strong>R$ <b id="total">0,00</b></strong>
      </div>
      <button class="btn-finalizar" onclick="finalizarPedido()">Finalizar e Imprimir</button>
    </section>
  </main>

  <div id="modalRelatorio" class="modal oculto">
    <div class="modal-box">
      <button class="fechar" onclick="fecharRelatorio()">×</button>
      <h2>📊 Fechamento do Dia</h2>
      <div id="relatorioConteudo"></div>
      <button class="btn-imprimir" onclick="imprimirRelatorio()">Imprimir Relatório</button>
      <button class="btn-zerar" onclick="zerarRelatorio()">Zerar Dia</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
